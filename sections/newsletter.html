<section id="our-story">
  <div class="container">
    <div class="newsletter reveal">
      <h2>Get 10% off your first order</h2>
      <p>Formulation notes, restock alerts, and nothing else. Unsubscribe anytime.</p>
      <form class="nl-form" id="nlForm" novalidate>
        <label for="nlEmail" class="sr-only" style="position:absolute; left:-9999px;">Email address</label>
        <input type="email" id="nlEmail" name="email" placeholder="you@email.com" required aria-describedby="nlMsg">
        <button type="submit" class="btn btn-primary" data-ripple>Subscribe</button>
      </form>
      <p class="nl-msg" id="nlMsg" role="status"></p>
    </div>
  </div>
</section>
